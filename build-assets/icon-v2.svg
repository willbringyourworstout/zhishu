<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!--
    智枢 ZhiShu — icon-v2
    设计决策摘要
    ─────────────────────────────────────────────────────────────────
    造型：锻造锤（forge hammer）侧视图。锤头为梯形（上宽下窄），
          打击面平整，顶面略宽（工业感）。锤柄为轻度锥形（上细下粗），
          长度约为锤头宽度的 1.6 倍，模拟木柄人体工程学形状。
          整体沿 Z 轴旋转 -45°（锤头右上 / 锤柄左下），
          构图重心偏右上 1/3 区域，与 squircle 底盘的视觉平衡感匹配。

    光源：假设光源在左上方（11 点钟方向）。
          锤头顶面（打击面）最亮；锤头侧面中间亮度；
          锤头底面（与柄相接处）最暗。柄亮面在左侧，暗面在右侧。
          质感目标：磨砂金属（satin metal），非镜面高光——
          Linear/Raycast 档的 icon 质感，有立体感但不浮夸。

    色彩：
      · 背景底板：深碳黑 #1C1C1E（macOS Dark 原生底色感）
      · 背景次层：极轻的暖黑渐变，营造轻微深度，非正黑
      · 锤头主体：琥珀橙金属渐变 #F59E0B → #B45309（品牌主色保留）
      · 锤头高光面：更亮的 #FCD34D，宽度只占 1/5，避免过分闪亮
      · 锤头暗面：深琥珀 #78350F，模拟阴影体积
      · 锤柄亮面：暖灰白 #E5D5B0（木质感中性，衬托金属头）
      · 锤柄暗面：深棕 #4A3728
      · 所有渐变通过 <defs> 定义，方便主题切换

    小尺寸降级策略（16×16 / 32×32）：
      · 锤头梯形的梯度细节消失，保留纯色块轮廓
      · 锤柄缩减为单色细线，不拆分明暗面
      · 锤头顶面高光线去掉，只保留主体轮廓与背景对比
      · 整体通过 SVG 的 viewBox 自然缩放；在极小尺寸下
        品牌色琥珀橙 vs 深色背景的高对比度保证可辨识性

    品牌色配比：
      · 主色（琥珀橙系）占画面比 ~35%（锤头本体）
      · 中性色（木柄暖灰）占 ~20%（锤柄）
      · 背景深色占 ~45%
      · 三色原则严格遵守：深底 / 橙金锤头 / 暖灰柄
    ─────────────────────────────────────────────────────────────────
  -->

  <defs>
    <!-- ── 背景：深碳黑 + 极轻暖向渐变，非纯黑，保留层次 ── -->
    <linearGradient id="grad-bg" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%"   stop-color="#252528"/>
      <stop offset="100%" stop-color="#141416"/>
    </linearGradient>

    <!-- ── 锤头：琥珀橙金属，光源左上 → 右下变暗 ── -->
    <linearGradient id="grad-head" x1="15%" y1="10%" x2="85%" y2="90%">
      <!-- 高光端（左上，光源侧） -->
      <stop offset="0%"   stop-color="#FCD34D"/>
      <!-- 主色中段 -->
      <stop offset="40%"  stop-color="#F59E0B"/>
      <!-- 过渡 -->
      <stop offset="75%"  stop-color="#D97706"/>
      <!-- 暗部端（右下，背光侧） -->
      <stop offset="100%" stop-color="#92400E"/>
    </linearGradient>

    <!-- ── 锤头打击面（顶面）：最亮，光源直射 ── -->
    <linearGradient id="grad-face" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#FEF3C7" stop-opacity="0.9"/>
      <stop offset="50%"  stop-color="#FDE68A" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#FCD34D" stop-opacity="0.3"/>
    </linearGradient>

    <!-- ── 锤柄亮面：暖木色，光源左侧打亮 ── -->
    <linearGradient id="grad-handle-light" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#D4B896"/>
      <stop offset="100%" stop-color="#B08060"/>
    </linearGradient>

    <!-- ── 锤柄暗面：右侧背光面 ── -->
    <linearGradient id="grad-handle-dark" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#6B4A30"/>
      <stop offset="100%" stop-color="#3D2314"/>
    </linearGradient>

    <!-- ── 锤头内侧（与柄连接处）暗影，增加体积感 ── -->
    <linearGradient id="grad-head-inner" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%"   stop-color="#451A03" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#451A03" stop-opacity="0.0"/>
    </linearGradient>

    <!-- ── 背景底板内发光：轻微，避免死黑 ── -->
    <radialGradient id="grad-bg-glow" cx="45%" cy="40%" r="50%">
      <stop offset="0%"   stop-color="#3A2800" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#3A2800" stop-opacity="0.0"/>
    </radialGradient>
  </defs>

  <!-- ══════════════════════════════════════════════════
       底板：macOS squircle（rx=228 对应苹果标准圆角比例）
       深碳黑底 + 轻暖发光，非纯黑，保留质感深度
  ══════════════════════════════════════════════════ -->
  <rect width="1024" height="1024" rx="228" fill="url(#grad-bg)"/>
  <rect width="1024" height="1024" rx="228" fill="url(#grad-bg-glow)"/>

  <!-- ══════════════════════════════════════════════════
       锤子主体 — 旋转 -45°，锤头右上 / 锤柄左下
       整体 pivot：画布中心 (512, 512)
       旋转后视觉重心偏右上 1/3，符合"打击动势"构图

       坐标体系（旋转前，局部坐标，原点在画布中心）：
         锤头：y 轴负方向（向上）
         锤柄：y 轴正方向（向下）
  ══════════════════════════════════════════════════ -->
  <g transform="translate(512, 512) rotate(-45)">

    <!--
      ── 锤柄（暗面 + 亮面叠加实现圆柱感）──
      形状：上窄下宽的轻锥形矩形（模拟木柄人体工程学）
      宽度：上端 52px → 下端 68px（锥形差值 8px per side）
      长度：460px（从锤头底部延伸至柄末端）
      位置：y=80 到 y=540（锤头底部 80 到柄末端 540）

      用两个叠加矩形模拟圆柱明暗：
        · 整体矩形铺暗面色
        · 左侧 40% 宽度叠加亮面色（光源在左）
    -->

    <!-- 锤柄基础（暗面/右侧） -->
    <path d="
      M -26,80
      L -34,540
      L  34,540
      L  26,80
      Z
    " fill="url(#grad-handle-dark)" rx="16"/>

    <!-- 锤柄亮面（左侧 40%，光源方向） -->
    <path d="
      M -26,80
      L -34,540
      L  -2,540
      L  -4,80
      Z
    " fill="url(#grad-handle-light)" opacity="0.92"/>

    <!-- 锤柄底端圆头（收尾，防止硬切） -->
    <ellipse cx="0" cy="540" rx="34" ry="18" fill="#5C3820"/>
    <ellipse cx="0" cy="538" rx="30" ry="12" fill="#7A4F30"/>

    <!-- 锤柄握持环（工艺细节，仅大尺寸可见；小尺寸靠 opacity 消隐） -->
    <rect x="-36" y="370" width="72" height="14" rx="7"
          fill="#2C1508" opacity="0.5"/>
    <rect x="-36" y="385" width="72" height="8" rx="4"
          fill="#2C1508" opacity="0.3"/>

    <!--
      ── 锤头（梯形，锻造锤侧视）──
      造型：上宽下窄的等腰梯形
        · 顶边（打击面）宽 =360px，这是锤击动作的直接接触面，最宽最亮
        · 底边（与柄相接）宽 =200px
        · 高度 =240px
        · 上端 y=-320，下端 y=-80（接近柄顶端 y=80 处留缺口用于嵌入感）
      梯形 path（顺时针，局部坐标）：
        左上 (-180, -320) → 右上 (180, -320)
        右下 ( 100,  -80) → 左下 (-100,  -80)
      圆角：顶角 r=24（工业圆角，不卡通），底角 r=12

      说明：直接在 path 的 d 属性里用贝塞尔曲线模拟圆角，
      避免 clipPath 开销，保证跨 SVG 渲染器的兼容性。
    -->

    <!-- 锤头主体（梯形，琥珀橙金属渐变） -->
    <path d="
      M -156,-320
      Q -180,-320 -180,-296
      L -100,-92
      Q -100,-80  -88,-80
      L  88,-80
      Q  100,-80  100,-92
      L  180,-296
      Q  180,-320  156,-320
      Z
    " fill="url(#grad-head)"/>

    <!--
      ── 锤头打击面（顶面）叠加高光 ──
      打击面是最亮区域，光源直射面。
      用一个略内缩的梯形叠加半透明白→透明渐变，
      宽度只占顶部 1/5 高度，不抢主体色。
    -->
    <path d="
      M -156,-320
      Q -180,-320 -180,-296
      L -164,-260
      Q -156,-248 -140,-248
      L  140,-248
      Q  156,-248  164,-260
      L  180,-296
      Q  180,-320  156,-320
      Z
    " fill="url(#grad-face)" opacity="0.85"/>

    <!--
      ── 锤头底部暗影（与柄衔接处阴影）──
      模拟锤头底面因背光产生的阴影，增加体积感。
      仅底部 1/4 高度范围内叠加深色半透明层。
    -->
    <path d="
      M -108,-140
      L -100,-80
      Q -100,-80  -88,-80
      L  88,-80
      Q  100,-80  100,-92
      L  108,-140
      Z
    " fill="url(#grad-head-inner)"/>

    <!--
      ── 锤头顶部边缘高光线 ──
      一条极细的近白色线（height=6px），
      模拟磨砂金属边缘的光泽线（satin metal edge catch）。
      仅在 128px 以上尺寸可见，小尺寸自然消失。
    -->
    <path d="
      M -156,-320
      Q -180,-320 -180,-296
      L -176,-286
      Q -176,-314  -152,-314
      L  152,-314
      Q  176,-314  176,-286
      L  180,-296
      Q  180,-320  156,-320
      Z
    " fill="#FEF9EE" opacity="0.55"/>

    <!--
      ── 锤头侧面边缘暗线 ──
      左侧边缘（光源侧对面）用极细暗线模拟体积厚度。
      不用描边（stroke 在小尺寸下产生视觉噪声），
      改用内缩 2px 的深色 path 叠加。
    -->
    <path d="
      M -180,-296
      L -100,-92
      L -96,-96
      L -174,-296
      Z
    " fill="#451A03" opacity="0.35"/>

  </g>

  <!--
    ── 底板光泽层（最顶层叠加，模拟 squircle 玻璃感上边缘反光）──
    极轻的白色线性渐变，只在顶部 30% 高度内出现，
    参考 macOS Big Sur+ icon 的 sheen 惯例。
    opacity=0.06，非常克制，避免廉价玻璃感。
  -->
  <rect width="1024" height="1024" rx="228"
        fill="none"
        stroke="#FFFFFF"
        stroke-width="2"
        stroke-opacity="0.08"/>

</svg>
